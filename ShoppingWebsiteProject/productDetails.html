<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <link rel="stylesheet" href="ShoppingWebsite.css">
</head>

<body>
    <header>
        <div class="icon">Sneaker Shop</div>
        <nav class="nav-links">
            <ul>
                <li><a href="#">Men</a></li>
                <li><a href="#">Women</a></li>
                <li><a href="#">Kids</a></li>
            </ul>
        </nav>
        <div class="search-bar">
            <input type="text" placeholder="Search" id="search-box">
            <button type="submit" id="search-btn">🛒</button>
        </div>
    </header>
    <main class="product-container">

        <div class="img-container">
            <img src="https://ik.imagekit.io/d9mvewbju/Course/BigbinaryAcademy/shoe7-larger-a_Ux2ekfF45.jpg?updatedAt=1728893954940"
                alt="Shoe img 1">

            <img src="https://ik.imagekit.io/d9mvewbju/Course/BigbinaryAcademy/shoe7-larger-b_dv1lRR_EA.jpg?updatedAt=1728893902496"
                alt="Shoe img 2">
        </div>

        <div class="content">
            <h2>
                Action Hyper High Side View
            </h2>

            <div class="description">
                <p>Men`s Shoes</p>
                <p>MRP: ₹ 13,995</p>
            </div>

            <div class="size">
                <h3>Select Size</h3>
                <div class="size-btns">
                    <button>UK 10</button>
                    <button>UK 10.5</button>
                    <button>UK 11</button>
                    <button>UK 11.5</button>
                    <button>UK 12</button>
                    <button>UK 12.5</button>
                </div>
            </div>

            <div class="interaction">
                <button id="cart">Add to Bag</button>
                <button id="like">Favourite ♥</button>
            </div>
        </div>

    </main>
</body>

</html>
